<h3 class="mt-4 mb-3 fw-bold">👕 Camisetas Disponibles</h3>

<div class="row">

  <!-- Columna de camisetas -->
  <div class="col-9">
    <div class="row g-3">
      <ng-container *ngIf="camisetas$ | async as camisetas">

        <div class="col-12 col-md-6 col-lg-4" *ngFor="let camiseta of camisetas">
          <div class="card h-100 shadow-sm camiseta-card" [class.clearance]="camiseta.clearance">
            
            <div class="camiseta-img-wrapper">
              <img [src]="camiseta.image" [alt]="camiseta.team" class="card-img-top">
            </div>

            <div class="card-body d-flex flex-column">
              <h5 class="card-title fw-bold mb-1">{{ camiseta.team }} - {{ camiseta.player }}</h5>
              <p class="text-muted mb-2">{{ camiseta.brand }} · {{ camiseta.year }}</p>

              <div class="d-flex justify-content-between align-items-center mb-2">
                <span class="fs-5 fw-bold text-success">{{ camiseta.price | currency }}</span>
                <span *ngIf="camiseta.stock > 0; else sinStock" class="badge bg-success">
                  {{ camiseta.stock }} u.
                </span>
                <ng-template #sinStock>
                  <span class="badge bg-danger">SIN STOCK</span>
                </ng-template>
              </div>

              <div class="mt-auto">
                <app-input-integer 
                  [(quantity)]="camiseta.quantity" 
                  [max]="camiseta.stock" 
                  (maxReached)="maxReached($event)">
                </app-input-integer>

                <button class="btn btn-primary w-100 mt-2" (click)="addToCart(camiseta)">
                  Comprar
                </button>
              </div>
            </div>

          </div>
        </div>

        <div class="col-12" *ngIf="camisetas.length === 0">
          <p class="text-muted text-center py-4">No hay camisetas disponibles en este momento.</p>
        </div>

      </ng-container>
    </div>
  </div>

  <!-- Columna del carrito -->
  <div class="col-3">
    <app-cart></app-cart>
  </div>

</div>
