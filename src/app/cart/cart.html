<div class="card shadow-sm cart-card">
  <div class="card-header bg-dark text-white d-flex justify-content-between align-items-center">
    <span class="fw-bold">🛒 Carrito de compras</span>
  </div>

  <ng-container *ngIf="(cartList$ | async) as cartList">

    <ul class="list-group list-group-flush" *ngIf="cartList.length > 0; else emptyCart">
      <li class="list-group-item" *ngFor="let item of cartList">
        <div class="d-flex justify-content-between align-items-start">
          <div>
            <div class="fw-semibold">{{ item.team }} - {{ item.player }}</div>
            <small class="text-muted">
              {{ item.quantity }} u. x {{ item.price | currency }}
            </small>
          </div>
          <span class="fw-bold text-success">
            {{ item.price * item.quantity | currency }}
          </span>
        </div>
      </li>
    </ul>

    <ng-template #emptyCart>
      <div class="card-body text-center text-muted py-4">
        El carrito está vacío.
      </div>
    </ng-template>

    <div class="card-footer bg-white" *ngIf="cartList.length > 0">
      <div class="d-flex justify-content-between align-items-center mb-3">
        <span class="fw-bold">Total</span>
        <span class="fs-5 fw-bold text-success">{{ getTotal(cartList) | currency }}</span>
      </div>
      <button class="btn btn-outline-danger w-100" (click)="clearCart()">
        Vaciar carrito
      </button>
    </div>

  </ng-container>
</div>
