<div class="d-flex align-items-center justify-content-center gap-2">
        <!-- Botón de menos (-) -->
         <button type="button" class="btn btn-primary btn-sm px-2 fw-bold" (click)="downQuantity()">
        -
        </button>
        <input type="number" 
        class="form-control text-center mx-auto" 
        [(ngModel)]="quantity" 
        (keyup)="changeQuantity($event)">

          <!-- Botón de más (+) -->
        <button type="button" class="btn btn-primary btn-sm px-2 fw-bold" (click)="upQuantity()"> +
        </button>
</div>
